spring.application.name=wallet-api
server.port=8080

# ─── MySQL DataSource ──────────────────────────────────────────────────────────
spring.datasource.url=jdbc:mysql://localhost:3306/walletdb?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=root
spring.datasource.password=root123

# ─── Connection Pool (HikariCP) ────────────────────────────────────────────────
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000

# ─── JPA / Hibernate ──────────────────────────────────────────────────────────
# dialect is auto-detected for MySQL — no need to set it explicitly
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.use_sql_comments=true
spring.jpa.open-in-view=false

# ─── Logging ──────────────────────────────────────────────────────────────────
logging.level.com.wallet=DEBUG
logging.level.org.hibernate.SQL=DEBUG
